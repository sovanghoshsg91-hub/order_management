ci:
  name: Build, Test, Analyse
  runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Build + SpotBugs in one Maven invocation ✅
    - name: Build and Static Analysis
      run: mvn clean package com.github.spotbugs:spotbugs-maven-plugin:4.8.2.0:check -DskipTests --batch-mode --no-transfer-progress

    # OWASP — runs but never blocks pipeline ✅
    - name: OWASP Dependency Check
      run: |
        mvn org.owasp:dependency-check-maven:9.0.6:check \
          -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
          -DfailBuildOnCVSS=11 \
          --batch-mode --no-transfer-progress
      continue-on-error: true

    - name: Upload Dependency Check Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dependency-check-report
        path: '**/target/dependency-check-report.html'
        if-no-files-found: ignore